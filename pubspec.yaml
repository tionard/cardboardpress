name: cardboardpress
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter_riverpod: ^3.3.2
  file_picker: 12.0.0-beta.7  # 11.x fails to build on Android (missing kotlin plugin, file_picker issue #1973); fix is in the 12.0 line, which keeps the same static API. Drop the -beta suffix once 12.0.0 ships stable.
  path_provider: ^2.1.6
  path: ^1.9.1
  crypto: ^3.0.6     # SHA-256 content hashing: uploads are stored content-addressed, so identical bytes dedup to one file
  pdf: ^3.11.1       # print-sheet export as true-size PDF (sheet_pdf.dart); pure Dart
  gal: ^2.3.0          # save exported PNGs to the device gallery (Android)
  archive: ^3.6.1      # zip read/write for Backup & Restore. Pinned to 3.x: the 4.x line moved file content behind streams; 3.x keeps the simple in-memory Archive/ZipEncoder/ZipDecoder API.
  share_plus: ^13.1.0  # 13.x uses win32 ^6.x, matching file_picker 12.x (12.x needs win32 ^6.3.0, share_plus 12.x pinned win32 ^5.5.3 — incompatible). Same SharePlus.instance.share API.

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Bundled files. The per-family OFL license texts ship as assets and are
  # surfaced in Flutter's LicenseRegistry (see main.dart) — the SIL Open Font
  # License requires the license to accompany the fonts in distribution.
  assets:
    - assets/fonts/licenses/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Template-pickable fonts (model/font_catalog.dart mirrors this list; the
  # family strings below are what TextStyleSpec.fontFamily stores). All SIL
  # OFL, fetched from github.com/google/fonts. Bracketed [wght] files are
  # VARIABLE fonts: they register as one asset and the renderer selects the
  # weight via a `wght` FontVariation (see paint_text.dart). Almendra and
  # Alegreya SC are static-only families, so their true Bold files are
  # registered at weight 700 the classic way.
  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: Uncial Antiqua
      fonts:
        - asset: assets/fonts/UncialAntiqua.ttf
    - family: Almendra
      fonts:
        - asset: assets/fonts/Almendra.ttf
        - asset: assets/fonts/Almendra-Bold.ttf
          weight: 700
    - family: Almendra SC
      fonts:
        - asset: assets/fonts/AlmendraSC.ttf
    - family: EB Garamond
      fonts:
        - asset: assets/fonts/EBGaramond.ttf
    - family: Alegreya
      fonts:
        - asset: assets/fonts/Alegreya.ttf
    - family: Alegreya SC
      fonts:
        - asset: assets/fonts/AlegreyaSC.ttf
        - asset: assets/fonts/AlegreyaSC-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: Dancing Script
      fonts:
        - asset: assets/fonts/DancingScript.ttf
    - family: Great Vibes
      fonts:
        - asset: assets/fonts/GreatVibes.ttf
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323.ttf
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron.ttf
    - family: Bangers
      fonts:
        - asset: assets/fonts/Bangers.ttf
