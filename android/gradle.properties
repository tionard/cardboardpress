org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Kotlin incremental compilation stores source paths relative to the build dir.
# When the pub cache (on C:) and this project (on F:) live on different Windows
# drive letters, Kotlin can't relativize a path across drive roots and the build
# crashes with "this and base files have different roots" while closing its
# caches. Disabling incremental Kotlin compilation avoids that cache entirely.
# This app has almost no Kotlin, so the rebuild-speed cost is negligible.
# (Remove this line if the project and pub cache ever end up on the same drive.)
kotlin.incremental=false
